version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    volumes: ["./data:/app/data"]

  ui:
    build:
      context: .
      dockerfile: Dockerfile.chainlit
    ports: ["8080:8080"]
    env_file: .env
    environment:
      - BASE_URL=http://api:8000
    depends_on: [api]
